name: bottom_shelf
version: 0.1.0-wip
description: A high-performance, direct-to-socket Shelf adapter.
repository: https://github.com/dart-lang/shelf/tree/master/pkgs/bottom_shelf

environment:
  sdk: ^3.10.0

dependencies:
  collection: ^1.15.0
  http_parser: ^4.1.0
  shelf: any
  stream_channel: any

dev_dependencies:
  dart_flutter_team_lints: ^3.0.0
  test: ^1.16.0

dependency_overrides:
  shelf:
    path: ../shelf
