name: bottom_shelf
version: 0.1.0-wip
description: A high-performance, direct-to-socket Shelf adapter.
repository: https://github.com/dart-lang/shelf/tree/master/pkgs/bottom_shelf

environment:
  sdk: ^3.10.0

dependencies:
  collection: ^1.19.0
  http_parser: ^4.1.0
  shelf: ^1.4.0
  stream_channel: ^2.1.0

dev_dependencies:
  dart_flutter_team_lints: ^3.0.0
  http: ^1.0.0
  stack_trace: ^1.12.1
  test: ^1.16.6

dependency_overrides:
  shelf:
    path: ../shelf
